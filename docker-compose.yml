services:
  db:
    image: postgres:16
    container_name: sentinelx-db
    shm_size: "1g"
    restart: unless-stopped

    environment:
      POSTGRES_DB: sentinelx_db
      POSTGRES_USER: sentinelx
      POSTGRES_PASSWORD: "i%Rm70BuPxLeIrAt$8A%dFT8"
      POSTGRES_INITDB_ARGS: "--data-checksums"

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

    stop_signal: SIGINT
    stop_grace_period: 2m

    command: >
      postgres
      -c shared_buffers=256MB
      -c wal_compression=on
      -c max_wal_size=2GB
      -c checkpoint_timeout=10min
      -c checkpoint_completion_target=0.9
      -c log_checkpoints=on
      -c log_min_duration_statement=2000
      -c log_line_prefix='%m[%p] user=%u db=%d app=%a client=%h '
      -c idle_in_transaction_session_timeout=300000
      -c statement_timeout=0
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c pg_stat_statements.max=10000
      -c pg_stat_statements.save=on

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelx -d sentinelx_db -h 127.0.0.1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

    tmpfs:
      - /tmp

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  backend:
    build:
      context: .
    container_name: sentinelx-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      UPLOADED_LOGS_DIR: /app/uploaded_logs
      GEOIP_COUNTRY_DB_PATH: /geoip/GeoLite2-Country.mmdb
      GEOIP_ASN_DB_PATH: /geoip/GeoLite2-ASN.mmdb
      ENRICH_INLINE: "1"
      ENRICH_CACHE_TTL: "86400"
      ENRICH_CACHE_MAX: "100000"
      RULES_RELOAD_SECONDS: "600"


    ports:
      - "8000:8000"

    volumes:
      - .:/app
      - ./geoip:/geoip:ro

    stop_grace_period: 1m

    command: >
      bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  parsing_worker:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      UPLOADED_LOGS_DIR: /app/uploaded_logs
      GEOIP_COUNTRY_DB_PATH: /geoip/GeoLite2-Country.mmdb
      GEOIP_ASN_DB_PATH: /geoip/GeoLite2-ASN.mmdb
      ENRICH_INLINE: "1"
      ENRICH_CACHE_TTL: "86400"
      ENRICH_CACHE_MAX: "100000"
      RULES_RELOAD_SECONDS: "600"
      WORKER_POLL_SECONDS: "2"
      WORKER_MAX_PER_CYCLE: "1"
      WORKER_STALE_SECONDS: "3600"


    volumes:
      - .:/app
      - ./geoip:/geoip:ro

    stop_grace_period: 1m

    command: >
      bash -lc "python -m app.workers.parsing_worker_loop"

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  engine_worker:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      GEOIP_COUNTRY_DB_PATH: /geoip/GeoLite2-Country.mmdb
      GEOIP_ASN_DB_PATH: /geoip/GeoLite2-ASN.mmdb
      RULES_RELOAD_SECONDS: "600"
      ENGINE_WORKER_POLL_SECONDS: "1"
      ENGINE_WORKER_MAX_PER_CYCLE: "200"
      ENGINE_WORKER_STALE_SECONDS: "3600"


    volumes:
      - .:/app
      - ./geoip:/geoip:ro

    stop_grace_period: 1m

    command: >
      bash -lc "python -m app.workers.engine_worker_loop"

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"


  frontend_local:
    image: nginx:alpine
    container_name: sentinelx-frontend
    restart: unless-stopped
    ports:
      - "4321:80"
    volumes:
      - ./nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
      - /Users/neubox/Projects/SentinelX-Neubox/public_html:/usr/share/nginx/html:ro
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
